  "T","A","N"," "," ","N","E","E"," ","E"," ","Y","O","U","T","H"
];

const COLS = 16, ROWS = 17;

function isWhite(r, c) {
  if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
  return SOLUTION[r * COLS + c] !== ' ';
}

// Number cells
const cellNums = {};
let nn = 1;
for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    if (!isWhite(r, c)) continue;
    const sA = !isWhite(r, c-1) && isWhite(r, c+1);
    const sD = !isWhite(r-1, c) && isWhite(r+1, c);
    if (sA || sD) { cellNums[`${r},${c}`] = nn; nn++; }
  }
}

// Build grid
const gridEl = document.getElementById('grid');
for (let r = 0; r < ROWS; r++) {
  for (let c = 0; c < COLS; c++) {
    const idx = r * COLS + c;
    const cell = document.createElement('div');
    const white = SOLUTION[idx] !== ' ';
    cell.className = 'cell' + (white ? ' solved' : ' black');

    if (white) {
      const num = cellNums[`${r},${c}`];
      if (num) {
        const s = document.createElement('span');
        s.className = 'cell-number';
        s.textContent = num;
        cell.appendChild(s);
      }
      const l = document.createElement('span');
      l.className = 'cell-letter';
      l.textContent = SOLUTION[idx];
      cell.appendChild(l);
    }

    gridEl.appendChild(cell);
  }
}

          explanation: `A double definition; if you are (e.g. 20p) SHY you are 'short', and a SHY person could also be described as 'shrinking'.` },
    34: { answer: 'NEU',         len: '3',    clue: `New in cologne: <span class="cologne-name">Union</span>`,
          explanation: `In Cologne, i.e. in Germany, the word for 'new' is NEU, which is the National Education Union, the largest teacher's union in the UK. Using 'union' as the name of a new cologne seemed a bit of a stretch, which is why I put it in a fancy font.` },
    35: { answer: 'HA',          len: '2',    clue: "Insides all drained out from haemophilia. LOL",
          explanation: `Deletion indicator; if you 'drained out' 'all' the 'insides' from 'haemophilia' you are left with just the first and last letters, HA, a word you might say in response to something funny, like 'LOL'.` },
  }
};

function buildList(listEl, clues, dir) {
  Object.keys(clues).map(Number).sort((a, b) => a - b).forEach(num => {
    const { answer, len, clue, explanation } = clues[num];
    const li = document.createElement('li');
    li.className = 'solution-item';
    li.innerHTML = `
      <div class="solution-header">
        <span class="solution-num">${num}</span>
        <span class="solution-answer">${answer} <span style="color:var(--mid);font-size:0.8em">(${len})</span></span>
      </div>
      <div class="solution-clue">${clue}</div>
      <div class="solution-explanation">${explanation}</div>
    `;
    listEl.appendChild(li);
  });
}

buildList(document.getElementById('across-list'), solutionData.across, 'across');
buildList(document.getElementById('down-list'), solutionData.down, 'down');
