<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #eeede6;
    --paper-2: #e6e4da;
    --ink: #1e2530;
    --ink-soft: #5b6270;
    --line: #c9c6ba;
    --accent: #3f6b5c;
    --accent-soft: #dbe7e1;
    --gold: #a9832f;
    --gold-soft: #ece0c2;
    --danger: #a8453a;
    --radius: 10px;
  }
  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background:
      linear-gradient(var(--paper), var(--paper)),
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(30,37,48,0.045) 28px);
    background-color: var(--paper);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  #app{ max-width: 560px; margin: 0 auto; min-height:100vh; display:flex; flex-direction:column; }

  header.top{
    position: sticky; top:0; z-index: 10;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
    padding: 18px 18px 14px;
  }
  header.top h1{
    font-family:'Fraunces', serif; font-weight:600; font-size: 26px; letter-spacing: -0.01em;
    margin:0; display:flex; align-items:center; gap:10px;
  }
  header.top h1 .mark{ color: var(--accent); font-variation-settings: 'opsz' 20; }
  .top-row{ display:flex; align-items:center; justify-content:space-between; }
  .icon-btn{
    border:1px solid var(--line); background: var(--paper); color: var(--ink);
    width:38px; height:38px; border-radius:50%; font-size:20px; line-height:1;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .icon-btn:active{ background: var(--paper-2); }

  main{ flex:1; padding: 10px 16px 100px; }

  .exercise-row{
    display:flex; align-items:center; justify-content:space-between;
    padding: 16px 4px; border-bottom: 1px solid var(--line);
    cursor:pointer;
  }
  .exercise-row:active{ background: var(--paper-2); }
  .exercise-name{ font-family:'Fraunces', serif; font-size:19px; font-weight:500; }
  .exercise-meta{ font-family:'IBM Plex Mono', monospace; font-size:12px; color: var(--ink-soft); margin-top:3px; }
  .type-badge{
    font-family:'IBM Plex Mono', monospace; font-size:10.5px; letter-spacing:0.04em; text-transform:uppercase;
    padding: 3px 8px; border-radius: 20px; white-space:nowrap;
  }
  .type-walk{ background: var(--accent-soft); color: var(--accent); }
  .type-run{ background: var(--accent-soft); color: var(--accent); }
  .type-weights{ background: var(--gold-soft); color: var(--gold); }
  .type-misc{ background: #e4e2f0; color: #5b4a9e; }

  .empty{
    text-align:center; padding: 60px 20px; color: var(--ink-soft);
  }
  .empty .glyph{ font-family:'Fraunces', serif; font-size:40px; color: var(--line); }

  .fab{
    position: fixed; bottom: 26px; left:50%; transform: translateX(-50%);
    width: min(528px, calc(100% - 32px));
    background: var(--ink); color: var(--paper);
    border:none; border-radius: 30px; padding: 15px 20px;
    font-family:'IBM Plex Sans', sans-serif; font-weight:600; font-size:15px;
    display:flex; align-items:center; justify-content:center; gap:8px;
    box-shadow: 0 6px 18px rgba(30,37,48,0.25);
    cursor:pointer;
  }
  .fab:active{ transform: translateX(-50%) scale(0.98); }

  /* Detail view */
  .back-row{ display:flex; align-items:center; gap:10px; margin-bottom:2px; }
  .back-btn{ background:none; border:none; font-size: 20px; cursor:pointer; color: var(--ink); padding:4px; }
  .detail-title{ font-family:'Fraunces', serif; font-size:24px; font-weight:600; }
  .detail-sub{ font-family:'IBM Plex Mono', monospace; font-size:12px; color: var(--ink-soft); margin-top:2px; }

  .entry-card{
    background: rgba(255,255,255,0.5);
    border:1px solid var(--line); border-radius: var(--radius);
    padding: 14px 16px; margin: 12px 0;
  }
  .entry-date{ font-family:'IBM Plex Mono', monospace; font-size:12px; color: var(--ink-soft); }
  .entry-stat{ font-family:'IBM Plex Mono', monospace; font-size:20px; font-weight:600; margin-top:4px; }
  .entry-stat .unit{ font-size:13px; font-weight:400; color: var(--ink-soft); }
  .entry-reps{ font-family:'IBM Plex Mono', monospace; font-size:15px; margin-top:4px; letter-spacing:0.02em; }
  .entry-notes{ font-size:13px; color: var(--ink-soft); margin-top:8px; font-style:italic; }
  .entry-actions{ text-align:right; margin-top:6px; }
  .link-btn{ background:none; border:none; font-family:'IBM Plex Mono', monospace; font-size:11.5px; color: var(--ink-soft); cursor:pointer; text-decoration: underline; padding:2px 6px; }
  .link-btn.danger{ color: var(--danger); }

  .toolbar{ display:flex; gap:8px; margin: 14px 0 4px; }
  .pill-btn{
    font-family:'IBM Plex Mono', monospace; font-size:12px;
    border:1px solid var(--line); background: var(--paper); color: var(--ink);
    border-radius: 20px; padding: 7px 12px; cursor:pointer;
  }

  /* Modal */
  .overlay{
    position:fixed; inset:0; background: rgba(30,37,48,0.4);
    display:flex; align-items:flex-end; justify-content:center; z-index: 50;
  }
  .sheet{
    background: var(--paper); width:100%; max-width: 560px;
    border-radius: 18px 18px 0 0; padding: 22px 20px calc(24px + env(safe-area-inset-bottom));
    max-height: 88vh; overflow-y:auto;
  }
  .sheet h2{ font-family:'Fraunces', serif; font-size:21px; font-weight:600; margin: 0 0 16px; }
  .field{ margin-bottom: 14px; }
  .field label{ display:block; font-family:'IBM Plex Mono', monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color: var(--ink-soft); margin-bottom:5px; }
  .field input[type=text], .field input[type=number], .field input[type=date], .field textarea, .field select{
    width:100%; padding: 11px 12px; border-radius:8px; border:1px solid var(--line);
    background: white; font-family:'IBM Plex Sans', sans-serif; font-size:15px; color:var(--ink);
  }
  .field textarea{ resize:vertical; min-height:60px; font-family:'IBM Plex Sans', sans-serif; }
  .row2{ display:flex; gap:10px; }
  .row2 > .field{ flex:1; }
  .type-choice{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .type-choice button{
    border:1px solid var(--line); background:white; border-radius:10px; padding:14px 10px;
    font-family:'IBM Plex Sans', sans-serif; font-size:14px; cursor:pointer; text-align:left;
  }
  .type-choice button.sel{ border-color: var(--accent); background: var(--accent-soft); }
  .type-choice .t-name{ font-weight:600; }
  .type-choice .t-desc{ font-size:11px; color:var(--ink-soft); margin-top:2px; }

  .sets-list{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
  .set-chip{ display:flex; align-items:center; gap:2px; background:white; border:1px solid var(--line); border-radius:8px; padding:4px 4px 4px 8px; }
  .set-chip .chip-val{ width:28px; text-align:center; font-family:'IBM Plex Mono', monospace; font-size:15px; font-weight:600; }
  .set-chip .chip-rm{ border:none; background:none; color:var(--danger); font-size:14px; cursor:pointer; padding:4px 6px; }
  .add-set-btn{ font-family:'IBM Plex Mono', monospace; font-size:12px; border:1px dashed var(--line); background:none; border-radius:8px; padding:6px 10px; cursor:pointer; color:var(--ink-soft); }

  .stepper-btn{
    border:1px solid var(--line); background:white; color:var(--ink); font-family:'IBM Plex Mono', monospace;
    font-size:16px; font-weight:600; width:30px; height:30px; border-radius:7px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; line-height:1; padding:0;
  }
  .stepper-btn:active{ background: var(--accent-soft); }
  .weight-stepper{ display:flex; align-items:center; gap:12px; background:white; border:1px solid var(--line); border-radius:8px; padding:8px 12px; }
  .weight-stepper .stepper-val{ flex:1; text-align:center; font-family:'IBM Plex Mono', monospace; font-size:20px; font-weight:600; }
  .weight-presets{ display:flex; gap:8px; margin-bottom:8px; }
  .preset-btn{
    font-family:'IBM Plex Mono', monospace; font-size:13px; font-weight:600; border:1px solid var(--line);
    background:white; border-radius:8px; padding:7px 12px; cursor:pointer; color:var(--ink);
  }
  .preset-btn.sel{ border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }

  .sheet-actions{ display:flex; gap:10px; margin-top: 18px; }
  .btn{
    flex:1; padding: 13px; border-radius:10px; border:none; font-family:'IBM Plex Sans', sans-serif;
    font-weight:600; font-size:15px; cursor:pointer;
  }
  .btn.primary{ background: var(--ink); color: var(--paper); }
  .btn.ghost{ background:none; border:1px solid var(--line); color:var(--ink); }

  #fileImportInput{ display:none; }
</style>
</head>
<body>
<div id="app">
  <header class="top">
    <div class="top-row">
      <h1><span class="mark">＋</span>Log</h1>
      <button class="icon-btn" id="menuBtn" title="Backup / restore">⋯</button>
    </div>
  </header>
  <main id="main"></main>
</div>

<input type="file" id="fileImportInput" accept=".json">

<script>
const STORE_KEY = 'exerciseTrackerData_v1';
const TYPES = {
  walk:    { label:'Walk',    desc:'Distance', badge:'type-walk' },
  run:     { label:'Run',     desc:'Distance + time', badge:'type-run' },
  weights: { label:'Weights', desc:'Weight / sets / reps', badge:'type-weights' },
  misc:    { label:'Misc',    desc:'Name + notes only', badge:'type-misc' },
};

function loadData(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : { exercises: [] };
  }catch(e){ return { exercises: [] }; }
}
function saveData(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

const SETTINGS_KEY = 'exerciseTrackerSettings_v1';
function loadSettings(){
  try{
    const raw = localStorage.getItem(SETTINGS_KEY);
    return raw ? JSON.parse(raw) : { autoBackup: true };
  }catch(e){ return { autoBackup: true }; }
}
function saveSettings(){ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
let settings = loadSettings();

function pad(n){ return String(n).padStart(2,'0'); }
function timestampForFilename(){
  const d = new Date();
  return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
}
// Called after every save/delete/import so a real file always lands in Downloads.
// This is what actually gets backed up by DriveSync (or similar) — localStorage alone does not.
function autoBackup(){
  if(!settings.autoBackup) return;
  try{
    downloadFile(JSON.stringify(state, null, 2), `exercise-log-${timestampForFilename()}.json`, 'application/json');
  }catch(e){ /* non-fatal: local copy in localStorage is still intact */ }
}

let state = loadData();
let view = { screen: 'list', exerciseId: null };

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDate(d){
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function render(){
  const main = document.getElementById('main');
  if(view.screen === 'list'){ main.innerHTML = renderList(); attachListHandlers(); }
  else if(view.screen === 'detail'){ main.innerHTML = renderDetail(view.exerciseId); attachDetailHandlers(view.exerciseId); }
}

function renderList(){
  if(state.exercises.length === 0){
    return `
      <div class="empty">
        <div class="glyph">—</div>
        <p>No exercises yet.<br>Add your first one below.</p>
      </div>
      <button class="fab" id="addExerciseFab">+ New exercise</button>
    `;
  }
  const rows = state.exercises.map(ex => {
    const t = TYPES[ex.type];
    const last = ex.entries[ex.entries.length - 1];
    const meta = last ? `Last logged ${fmtDate(last.date)} · ${ex.entries.length} entr${ex.entries.length===1?'y':'ies'}` : 'No entries yet';
    return `
      <div class="exercise-row" data-id="${ex.id}">
        <div>
          <div class="exercise-name">${esc(ex.name)}</div>
          <div class="exercise-meta">${meta}</div>
        </div>
        <span class="type-badge ${t.badge}">${t.label}</span>
      </div>
    `;
  }).join('');
  return `
    <div>${rows}</div>
    <button class="fab" id="addExerciseFab">+ New exercise</button>
  `;
}

function attachListHandlers(){
  document.getElementById('addExerciseFab').onclick = () => openAddExerciseSheet();
  document.querySelectorAll('.exercise-row').forEach(row => {
    row.onclick = () => { view = { screen:'detail', exerciseId: row.dataset.id }; render(); };
  });
}

function entryStatHTML(ex, entry){
  if(ex.type === 'walk'){
    return `<div class="entry-stat">${entry.distance} <span class="unit">${esc(entry.unit)}</span></div>`;
  }
  if(ex.type === 'run'){
    return `<div class="entry-stat">${entry.distance} <span class="unit">${esc(entry.unit)}</span></div>
            <div class="entry-meta" style="font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink-soft);margin-top:2px;">${esc(entry.time)} elapsed</div>`;
  }
  if(ex.type === 'weights'){
    const reps = (entry.reps||[]).join(' · ');
    return `<div class="entry-stat">${entry.weight} <span class="unit">${esc(entry.unit)}</span></div>
            <div class="entry-reps">${reps} <span style="color:var(--ink-soft);font-size:12px;">(${(entry.reps||[]).length} sets)</span></div>
            ${entry.variant ? `<div class="entry-meta" style="font-size:12px;color:var(--ink-soft);margin-top:2px;">${esc(entry.variant)}</div>` : ''}`;
  }
  return ''; // misc has no stat, just notes
}

function renderDetail(exerciseId){
  const ex = state.exercises.find(e => e.id === exerciseId);
  if(!ex){ view.screen = 'list'; return renderList(); }
  const t = TYPES[ex.type];
  const entries = [...ex.entries].sort((a,b) => b.date.localeCompare(a.date));
  const entryHTML = entries.length ? entries.map(entry => `
    <div class="entry-card" data-entry-id="${entry.id}">
      <div class="entry-date">${fmtDate(entry.date)}</div>
      ${entryStatHTML(ex, entry)}
      ${entry.notes ? `<div class="entry-notes">${esc(entry.notes)}</div>` : ''}
      <div class="entry-actions"><button class="link-btn danger" data-del-entry="${entry.id}">delete</button></div>
    </div>
  `).join('') : `<div class="empty" style="padding:36px 10px;"><p>No entries logged yet.</p></div>`;

  return `
    <div class="back-row">
      <button class="back-btn" id="backBtn">←</button>
      <div>
        <div class="detail-title">${esc(ex.name)}</div>
        <div class="detail-sub"><span class="type-badge ${t.badge}">${t.label}</span></div>
      </div>
    </div>
    <div class="toolbar">
      <button class="pill-btn" id="exportCsvBtn">Export CSV</button>
      <button class="pill-btn" id="deleteExerciseBtn" style="color:var(--danger);border-color:var(--danger);">Delete exercise</button>
    </div>
    <div style="margin-top:8px;">${entryHTML}</div>
    <button class="fab" id="addEntryFab">+ Log entry</button>
  `;
}

function attachDetailHandlers(exerciseId){
  document.getElementById('backBtn').onclick = () => { view = { screen:'list', exerciseId:null }; render(); };
  document.getElementById('addEntryFab').onclick = () => openAddEntrySheet(exerciseId);
  document.getElementById('exportCsvBtn').onclick = () => exportCSV(exerciseId);
  document.getElementById('deleteExerciseBtn').onclick = () => {
    const ex = state.exercises.find(e => e.id === exerciseId);
    if(confirm(`Delete "${ex.name}" and all its history? This can't be undone.`)){
      state.exercises = state.exercises.filter(e => e.id !== exerciseId);
      saveData(); autoBackup();
      view = { screen:'list', exerciseId:null };
      render();
    }
  };
  document.querySelectorAll('[data-del-entry]').forEach(btn => {
    btn.onclick = () => {
      const ex = state.exercises.find(e => e.id === exerciseId);
      ex.entries = ex.entries.filter(en => en.id !== btn.dataset.delEntry);
      saveData(); autoBackup(); render();
    };
  });
}

/* ---------- Add exercise sheet ---------- */
function openAddExerciseSheet(){
  let chosenType = null;
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="sheet">
      <h2>New exercise</h2>
      <div class="field">
        <label>Name</label>
        <input type="text" id="newExName" placeholder="e.g. Bench Press, 7 Minutes, Park Run">
      </div>
      <label style="display:block;font-family:'IBM Plex Mono', monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color: var(--ink-soft); margin-bottom:8px;">Type</label>
      <div class="type-choice" id="typeChoice">
        ${Object.entries(TYPES).map(([key,t]) => `
          <button data-type="${key}">
            <div class="t-name">${t.label}</div>
            <div class="t-desc">${t.desc}</div>
          </button>
        `).join('')}
      </div>
      <div class="sheet-actions">
        <button class="btn ghost" id="cancelBtn">Cancel</button>
        <button class="btn primary" id="saveExBtn">Add exercise</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelectorAll('[data-type]').forEach(btn => {
    btn.onclick = () => {
      overlay.querySelectorAll('[data-type]').forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
      chosenType = btn.dataset.type;
    };
  });
  overlay.querySelector('#cancelBtn').onclick = () => overlay.remove();
  overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
  overlay.querySelector('#saveExBtn').onclick = () => {
    const name = overlay.querySelector('#newExName').value.trim();
    if(!name){ alert('Give the exercise a name.'); return; }
    if(!chosenType){ alert('Pick a type.'); return; }
    const ex = { id: uid(), name, type: chosenType, entries: [] };
    state.exercises.push(ex);
    saveData(); autoBackup();
    overlay.remove();
    view = { screen:'detail', exerciseId: ex.id };
    render();
  };
}

/* ---------- Add entry sheet ---------- */
function openAddEntrySheet(exerciseId){
  const ex = state.exercises.find(e => e.id === exerciseId);
  const overlay = document.createElement('div');
  overlay.className = 'overlay';

  let bodyHTML = '';
  if(ex.type === 'walk'){
    bodyHTML = `
      <div class="row2">
        <div class="field"><label>Distance</label><input type="number" step="0.01" id="f_distance" placeholder="5"></div>
        <div class="field"><label>Unit</label>
          <select id="f_unit"><option value="km">km</option><option value="mi">mi</option></select>
        </div>
      </div>
    `;
  } else if(ex.type === 'run'){
    bodyHTML = `
      <div class="row2">
        <div class="field"><label>Distance</label><input type="number" step="0.01" id="f_distance" placeholder="5"></div>
        <div class="field"><label>Unit</label>
          <select id="f_unit"><option value="km">km</option><option value="mi">mi</option></select>
        </div>
      </div>
      <div class="field"><label>Time (mm:ss)</label><input type="text" id="f_time" placeholder="28:30"></div>
    `;
  } else if(ex.type === 'weights'){
    bodyHTML = `
      <div class="field"><label>Variant / type <span style="text-transform:none;">(optional)</span></label><input type="text" id="f_variant" placeholder="e.g. Barbell, Incline"></div>
      <div class="field">
        <label>Weight</label>
        <div class="weight-presets" id="weightPresets">
          <button type="button" class="preset-btn" data-preset="5">5 kg</button>
          <button type="button" class="preset-btn" data-preset="7.5">7.5 kg</button>
        </div>
        <div class="weight-stepper">
          <button type="button" class="stepper-btn" id="weightDown">−</button>
          <div class="stepper-val" id="weightVal">0</div>
          <button type="button" class="stepper-btn" id="weightUp">+</button>
        </div>
      </div>
      <div class="field"><label>Unit</label>
        <select id="f_wunit"><option value="kg">kg</option><option value="lb">lb</option><option value="bodyweight">bodyweight</option></select>
      </div>
      <label style="display:block;font-family:'IBM Plex Mono', monospace; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color: var(--ink-soft); margin-bottom:6px;">Sets (reps per set)</label>
      <div class="sets-list" id="setsList"></div>
      <button class="add-set-btn" id="addSetBtn" type="button">+ add set</button>
    `;
  }
  // notes field common to all
  bodyHTML += `
    <div class="field" style="margin-top:14px;"><label>Date</label><input type="date" id="f_date" value="${todayStr()}"></div>
    <div class="field"><label>Notes <span style="text-transform:none;">(optional)</span></label><textarea id="f_notes" placeholder="How it felt, what you skipped, PBs, etc."></textarea></div>
  `;

  overlay.innerHTML = `
    <div class="sheet">
      <h2>Log ${esc(ex.name)}</h2>
      ${bodyHTML}
      <div class="sheet-actions">
        <button class="btn ghost" id="cancelBtn">Cancel</button>
        <button class="btn primary" id="saveEntryBtn">Save entry</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector('#cancelBtn').onclick = () => overlay.remove();
  overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };

  const lastEntry = ex.entries.length ? ex.entries[ex.entries.length - 1] : null;
  let reps = (lastEntry && lastEntry.reps && lastEntry.reps.length) ? lastEntry.reps.slice() : [15];
  function renderSets(){
    const list = overlay.querySelector('#setsList');
    if(!list) return;
    list.innerHTML = reps.map((r,i) => `
      <div class="set-chip">
        <button type="button" class="stepper-btn" data-dec="${i}">−</button>
        <div class="chip-val">${r}</div>
        <button type="button" class="stepper-btn" data-inc="${i}">+</button>
        <button data-rm="${i}" type="button" class="chip-rm">✕</button>
      </div>
    `).join('');
    list.querySelectorAll('[data-dec]').forEach(btn => {
      btn.onclick = () => { const i = +btn.dataset.dec; reps[i] = Math.max(0, reps[i] - 1); renderSets(); };
    });
    list.querySelectorAll('[data-inc]').forEach(btn => {
      btn.onclick = () => { const i = +btn.dataset.inc; reps[i] = reps[i] + 1; renderSets(); };
    });
    list.querySelectorAll('[data-rm]').forEach(btn => {
      btn.onclick = () => { reps.splice(+btn.dataset.rm, 1); renderSets(); };
    });
  }

  let weight = lastEntry ? (lastEntry.weight || 0) : 5;
  function renderWeight(){
    const val = overlay.querySelector('#weightVal');
    if(!val) return;
    val.textContent = weight;
    overlay.querySelectorAll('#weightPresets .preset-btn').forEach(btn => {
      btn.classList.toggle('sel', parseFloat(btn.dataset.preset) === weight);
    });
  }
  if(ex.type === 'weights'){
    renderSets();
    overlay.querySelector('#addSetBtn').onclick = () => { reps.push(reps[reps.length-1] ?? 15); renderSets(); };

    renderWeight();
    overlay.querySelector('#f_wunit').value = lastEntry ? (lastEntry.unit || 'kg') : 'kg';
    overlay.querySelector('#weightDown').onclick = () => { weight = Math.max(0, +(weight - 0.5).toFixed(1)); renderWeight(); };
    overlay.querySelector('#weightUp').onclick = () => { weight = +(weight + 0.5).toFixed(1); renderWeight(); };
    overlay.querySelectorAll('#weightPresets .preset-btn').forEach(btn => {
      btn.onclick = () => { weight = parseFloat(btn.dataset.preset); renderWeight(); };
    });
  }

  overlay.querySelector('#saveEntryBtn').onclick = () => {
    const date = overlay.querySelector('#f_date').value || todayStr();
    const notes = overlay.querySelector('#f_notes').value.trim();
    const entry = { id: uid(), date, notes };

    if(ex.type === 'walk'){
      const distance = parseFloat(overlay.querySelector('#f_distance').value);
      if(!distance){ alert('Enter a distance.'); return; }
      entry.distance = distance;
      entry.unit = overlay.querySelector('#f_unit').value;
    } else if(ex.type === 'run'){
      const distance = parseFloat(overlay.querySelector('#f_distance').value);
      const time = overlay.querySelector('#f_time').value.trim();
      if(!distance){ alert('Enter a distance.'); return; }
      entry.distance = distance;
      entry.unit = overlay.querySelector('#f_unit').value;
      entry.time = time;
    } else if(ex.type === 'weights'){
      if(reps.length === 0){ alert('Add at least one set.'); return; }
      entry.variant = overlay.querySelector('#f_variant').value.trim();
      entry.weight = weight;
      entry.unit = overlay.querySelector('#f_wunit').value;
      entry.reps = reps.slice();
    }
    // misc: just date + notes, nothing else needed

    ex.entries.push(entry);
    saveData(); autoBackup();
    overlay.remove();
    render();
  };
}

/* ---------- CSV export ---------- */
function csvEscape(v){
  const s = String(v ?? '');
  if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}
function exportCSV(exerciseId){
  const ex = state.exercises.find(e => e.id === exerciseId);
  let headers, rows;
  if(ex.type === 'walk'){
    headers = ['date','distance','unit','notes'];
    rows = ex.entries.map(e => [e.date, e.distance, e.unit, e.notes]);
  } else if(ex.type === 'run'){
    headers = ['date','distance','unit','time','notes'];
    rows = ex.entries.map(e => [e.date, e.distance, e.unit, e.time, e.notes]);
  } else if(ex.type === 'weights'){
    headers = ['date','variant','weight','unit','sets','reps','notes'];
    rows = ex.entries.map(e => [e.date, e.variant, e.weight, e.unit, (e.reps||[]).length, (e.reps||[]).join(';'), e.notes]);
  } else {
    headers = ['date','notes'];
    rows = ex.entries.map(e => [e.date, e.notes]);
  }
  const sorted = rows.sort((a,b) => String(a[0]).localeCompare(String(b[0])));
  const csv = [headers.join(','), ...sorted.map(r => r.map(csvEscape).join(','))].join('\n');
  downloadFile(csv, `${ex.name.replace(/[^a-z0-9]+/gi,'_')}.csv`, 'text/csv');
}
function downloadFile(content, filename, mime){
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

/* ---------- Backup / restore menu ---------- */
document.getElementById('menuBtn').onclick = () => {
  const overlay = document.createElement('div');
  overlay.className = 'overlay';
  overlay.innerHTML = `
    <div class="sheet">
      <h2>Backup &amp; restore</h2>
      <p style="font-size:13px;color:var(--ink-soft);margin-top:-8px;">
        The working copy of your data lives only inside this browser (it can be lost if you clear
        site data, uninstall Chrome, or lose the phone). To protect against that, every time you log,
        add, or delete something, this app writes a timestamped JSON snapshot to your Downloads folder —
        point DriveSync (or similar) at that folder and every change gets mirrored to Drive automatically.
      </p>
      <div class="field" style="display:flex;align-items:center;gap:10px;margin-top:14px;">
        <input type="checkbox" id="autoBackupToggle" ${settings.autoBackup ? 'checked' : ''} style="width:18px;height:18px;">
        <label style="margin:0;text-transform:none;font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:var(--ink);">
          Auto-save a snapshot to Downloads on every change
        </label>
      </div>
      <p style="font-size:12px;color:var(--ink-soft);">
        Snapshots are small (a few KB) and timestamped, so they never overwrite each other —
        that also gives you a full history you can roll back to if needed.
      </p>
      <div class="sheet-actions">
        <button class="btn ghost" id="importBtn">Import backup</button>
        <button class="btn primary" id="exportBtn">Export backup now</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick = (e) => { if(e.target === overlay) overlay.remove(); };
  overlay.querySelector('#autoBackupToggle').onchange = (e) => {
    settings.autoBackup = e.target.checked;
    saveSettings();
  };
  overlay.querySelector('#exportBtn').onclick = () => {
    downloadFile(JSON.stringify(state, null, 2), `exercise-log-backup-${todayStr()}.json`, 'application/json');
  };
  overlay.querySelector('#importBtn').onclick = () => {
    document.getElementById('fileImportInput').click();
  };
};
document.getElementById('fileImportInput').onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      if(!parsed.exercises) throw new Error('bad format');
      if(confirm('Replace current data with this backup? Your current data will be overwritten.')){
        state = parsed;
        saveData();
        view = { screen:'list', exerciseId:null };
        // no autoBackup() here — the imported file itself is already a valid snapshot
        render();
      }
    }catch(err){
      alert('Could not read that file — is it a backup exported from this app?');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
};

render();
</script>
